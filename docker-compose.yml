services:
  media-baker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-baker
    ports:
      - "5000:5000"
    shm_size: "512mb"
    # GPU passthrough is host-specific. Uncomment one block.
    # NVIDIA (requires the NVIDIA driver and Container Toolkit on the host):
    # gpus: all
    # Intel/AMD VAAPI:
    # devices:
    #   - "/dev/dri:/dev/dri"
    volumes:
      - "./config.json:/config/config.json:ro"
      - "./cache:/cache"
      - "./logs:/logs"
      - "./downloads:/downloads"
      - "./fallback:/fallback:ro"
      # Change the left side to match your Docker host media paths.
      - "/mnt/media/TV Shows:/media/tv:ro"
      - "/mnt/media/Movies:/media/movies:ro"
    restart: unless-stopped
